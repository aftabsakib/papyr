name: papyr
description: "Papyr — a calm, paper-like reader for your PDF and EPUB library. 100% local."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Local storage for the library, reading progress, bookmarks, and settings.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # File system access: importing books and storing them in the app's library.
  path_provider: ^2.1.4
  path: ^1.9.0
  # Reading typography (Source Serif 4, Playfair Display, and UI sans).
  google_fonts: ^6.2.1
  # Small utilities.
  uuid: ^4.5.1
  intl: ^0.19.0
  pdfrx: ^2.4.4
  file_picker: ^11.0.2
  epubx: ^4.0.0
  flutter_epub_viewer: ^1.2.8
  # NOTE: the reader engines (PDF + EPUB) and the file picker are added via
  # `flutter pub add` so their versions resolve to the latest compatible release:
  #   pdfrx               -> PDF page rendering
  #   flutter_epub_viewer -> reflowable EPUB reading (themes, font size, spacing)
  #   epubx               -> EPUB metadata + cover extraction for the library
  #   file_picker         -> import books from device storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
