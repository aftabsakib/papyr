name: papyr
description: "Papyr — a calm, paper-like reader for your PDF and EPUB library. 100% local."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Local storage for the library, reading progress, bookmarks, and settings.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # File system access: importing books and storing them in the app's library.
  path_provider: ^2.1.4
  path: ^1.9.0
  # Reading typography (Source Serif 4, Playfair Display, and UI sans).
  google_fonts: ^6.2.1
  # Small utilities.
  uuid: ^4.5.1
  intl: ^0.19.0
  pdfrx: ^2.4.4
  file_picker: ^11.0.2
  flutter_epub_viewer: ^1.2.8
  archive: ^4.0.9
  xml: ^6.6.1
  collection: ^1.19.1
  # Content hashing for duplicate-import detection.
  crypto: ^3.0.5
  wakelock_plus: ^1.5.2
  screen_brightness: ^2.1.11
  # On-device OCR for scanned PDFs (no text layer). Stays fully local.
  google_mlkit_text_recognition: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/fonts/
  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf

# App launcher icon — the Papyr 'p' monogram on cream.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_full.png"
  adaptive_icon_background: "#F6F0E2"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

# Branded splash — the monogram on cream instead of the Flutter logo.
flutter_native_splash:
  color: "#F6F0E2"
  image: assets/icon/icon_foreground.png
  android_12:
    color: "#F6F0E2"
    image: assets/icon/icon_foreground.png
